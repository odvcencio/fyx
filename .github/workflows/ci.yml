name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyrox system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            runtime
            proofs/fyrox_2d

      - name: Run Go test suite
        run: go test ./...

      - name: Run runtime tests
        working-directory: runtime
        run: cargo test

      - name: Validate generated Rust
        run: |
          # Scale fixtures share script names (Weapon/Player/Enemy/HUD) with
          # canonical testdata but declare conflicting signal signatures. They
          # are validated separately as their own project by scale_test.go.
          go run ./cmd/fyxc check testdata --cargo-check --exclude scale

      - name: Compile Fyrox 2D proof crate
        run: cargo check --manifest-path proofs/fyrox_2d/Cargo.toml
